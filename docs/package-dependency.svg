<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" fill="none">
  <defs>
    <style>
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .mod-name { font-size: 12px; font-weight: 600; }
      .mod-file { font-size: 9px; font-family: 'SF Mono', monospace; fill: #64748b; }
      .mod-desc { font-size: 9px; fill: #94a3b8; }
      .dep-label { font-size: 8px; fill: #94a3b8; font-family: 'SF Mono', monospace; }
      .section { font-size: 10px; font-weight: 700; fill: #64748b; letter-spacing: 1.5px; }
    </style>
    <filter id="s" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-opacity="0.07"/>
    </filter>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
    <marker id="ah-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f87171"/>
    </marker>
    <marker id="ah-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="10" fill="#fafbfc"/>

  <!-- Title -->
  <text x="32" y="36" class="title">Package Dependency Graph</text>
  <text x="32" y="52" class="mod-desc" style="font-size:10px;">packages/ — TypeScript modules and their import relationships</text>

  <!-- ORCHESTRATE (small, discovery-only) -->
  <rect x="32" y="80" width="220" height="80" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#s)"/>
  <rect x="32" y="80" width="220" height="24" rx="8" fill="#eef2ff"/>
  <rect x="32" y="98" width="220" height="6" fill="#eef2ff"/>
  <text x="72" y="98" class="mod-name" fill="#4338ca">batch/orchestrate.ts</text>
  <text x="44" y="118" class="mod-file">130 lines · Discovery-only entry point</text>
  <text x="44" y="132" class="mod-desc">Batch search: discover leads in parallel</text>
  <text x="44" y="146" class="mod-desc">Only imports search.ts (no longer central hub)</text>

  <!-- DISCOVER (search.ts) -->
  <rect x="310" y="80" width="220" height="80" rx="8" fill="#ffffff" stroke="#bae6fd" filter="url(#s)"/>
  <rect x="310" y="80" width="220" height="24" rx="8" fill="#f0f9ff"/>
  <rect x="310" y="98" width="220" height="6" fill="#f0f9ff"/>
  <text x="366" y="98" class="mod-name" fill="#0369a1">discover/search.ts</text>
  <text x="322" y="118" class="mod-file">140 lines · Google Maps Places API (New)</text>
  <text x="322" y="132" class="mod-desc">searchPlaces(category, city) -> PlaceResult[]</text>
  <text x="322" y="146" class="mod-file">Pagination . filter: no website</text>

  <!-- Arrow: orchestrate -> search (only import) -->
  <path d="M 252 120 L 308 120" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="264" y="114" class="dep-label">import</text>

  <!-- PIPELINE: prepare.ts -->
  <rect x="588" y="80" width="280" height="80" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#s)"/>
  <rect x="588" y="80" width="280" height="24" rx="8" fill="#fff7ed"/>
  <rect x="588" y="98" width="280" height="6" fill="#fff7ed"/>
  <text x="660" y="98" class="mod-name" fill="#c2410c">pipeline/prepare.ts</text>
  <text x="600" y="118" class="mod-file">Mechanical data gathering + scaffold</text>
  <text x="600" y="132" class="mod-desc">Outputs PrepareResult: lead (raw) + hints (ClassificationHint)</text>
  <text x="600" y="146" class="mod-desc">Imports: photos, colors, optimize (NOT downloadFonts)</text>

  <!-- ASSETS ROW -->
  <text x="32" y="204" class="section">ASSETS PIPELINE</text>

  <!-- maps-photos -->
  <rect x="32" y="216" width="200" height="72" rx="8" fill="#ffffff" stroke="#bae6fd" filter="url(#s)"/>
  <rect x="32" y="216" width="200" height="24" rx="8" fill="#f0f9ff"/>
  <rect x="32" y="234" width="200" height="6" fill="#f0f9ff"/>
  <text x="62" y="234" class="mod-name" fill="#0369a1">assets/maps-photos.ts</text>
  <text x="44" y="254" class="mod-file">71 lines · Google Photos download</text>
  <text x="44" y="268" class="mod-desc">downloadMapsPhotos(photoNames, dir)</text>
  <text x="44" y="282" class="mod-file">Places Photo Media API · max 5</text>

  <!-- stock-photos -->
  <rect x="250" y="216" width="200" height="72" rx="8" fill="#ffffff" stroke="#fecdd3" filter="url(#s)"/>
  <rect x="250" y="216" width="200" height="24" rx="8" fill="#fff1f2"/>
  <rect x="250" y="234" width="200" height="6" fill="#fff1f2"/>
  <text x="282" y="234" class="mod-name" fill="#be123c">assets/stock-photos.ts</text>
  <text x="262" y="254" class="mod-file">106 lines · Unsplash fallback</text>
  <text x="262" y="268" class="mod-desc">downloadStockPhotos(industry, dir)</text>
  <text x="262" y="282" class="mod-file">Attribution compliance · Unsplash metadata</text>

  <!-- extract-colors -->
  <rect x="468" y="216" width="200" height="72" rx="8" fill="#ffffff" stroke="#fde68a" filter="url(#s)"/>
  <rect x="468" y="216" width="200" height="24" rx="8" fill="#fefce8"/>
  <rect x="468" y="234" width="200" height="6" fill="#fefce8"/>
  <text x="490" y="234" class="mod-name" fill="#a16207">assets/extract-colors.ts</text>
  <text x="480" y="254" class="mod-file">109 lines · node-vibrant palette</text>
  <text x="480" y="268" class="mod-desc">extractColors(img) -> BrandColors</text>
  <text x="480" y="282" class="mod-file">6 semantic CSS vars · fallback defaults</text>

  <!-- optimize-images -->
  <rect x="686" y="216" width="200" height="72" rx="8" fill="#ffffff" stroke="#d8b4fe" filter="url(#s)"/>
  <rect x="686" y="216" width="200" height="24" rx="8" fill="#faf5ff"/>
  <rect x="686" y="234" width="200" height="6" fill="#faf5ff"/>
  <text x="704" y="234" class="mod-name" fill="#7e22ce">assets/optimize-images.ts</text>
  <text x="698" y="254" class="mod-file">88 lines · Sharp WebP conversion</text>
  <text x="698" y="268" class="mod-desc">optimizeImages(dir) -> ImageManifest</text>
  <text x="698" y="282" class="mod-file">4 sizes: 320 · 640 · 960 · 1280</text>

  <!-- Arrows: prepare -> assets -->
  <path d="M 640 160 L 132 214" stroke="#94a3b8" stroke-width="1" marker-end="url(#ah)" stroke-dasharray="3 2"/>
  <path d="M 680 160 L 350 214" stroke="#94a3b8" stroke-width="1" marker-end="url(#ah)" stroke-dasharray="3 2"/>
  <path d="M 740 160 L 568 214" stroke="#94a3b8" stroke-width="1" marker-end="url(#ah)" stroke-dasharray="3 2"/>
  <path d="M 800 160 L 786 214" stroke="#94a3b8" stroke-width="1" marker-end="url(#ah)" stroke-dasharray="3 2"/>

  <!-- DESIGN PHASE MODULES -->
  <text x="32" y="332" class="section">DESIGN PHASE (called by Claude)</text>

  <!-- download-fonts -->
  <rect x="32" y="344" width="200" height="72" rx="8" fill="#ffffff" stroke="#c7d2fe" filter="url(#s)"/>
  <rect x="32" y="344" width="200" height="24" rx="8" fill="#eef2ff"/>
  <rect x="32" y="362" width="200" height="6" fill="#eef2ff"/>
  <text x="56" y="362" class="mod-name" fill="#4338ca">assets/download-fonts.ts</text>
  <text x="44" y="382" class="mod-file">Font download (Google Fonts API)</text>
  <text x="44" y="396" class="mod-desc">Called during Design phase (not Prepare)</text>
  <text x="44" y="410" class="mod-file">output/{slug}/public/fonts/</text>

  <!-- translate.ts (NEW) -->
  <rect x="250" y="344" width="200" height="72" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#s)"/>
  <rect x="250" y="344" width="200" height="24" rx="8" fill="#f0fdf4"/>
  <rect x="250" y="362" width="200" height="6" fill="#f0fdf4"/>
  <text x="302" y="362" class="mod-name" fill="#15803d">translate.ts</text>
  <text x="262" y="382" class="mod-file" style="fill:#15803d; font-weight:600;">NEW · Multi-locale translation</text>
  <text x="262" y="396" class="mod-desc">Opt-in via --locales flag</text>
  <text x="262" y="410" class="mod-file">en, ms, zh-CN, zh-TW</text>

  <!-- pipeline/finalize.ts -->
  <rect x="468" y="344" width="200" height="72" rx="8" fill="#ffffff" stroke="#bbf7d0" filter="url(#s)"/>
  <rect x="468" y="344" width="200" height="24" rx="8" fill="#f0fdf4"/>
  <rect x="468" y="362" width="200" height="6" fill="#f0fdf4"/>
  <text x="510" y="362" class="mod-name" fill="#15803d">pipeline/finalize.ts</text>
  <text x="480" y="382" class="mod-file">Build + quality gates + deploy</text>
  <text x="480" y="396" class="mod-desc">next build + Lighthouse + Vercel</text>
  <text x="480" y="410" class="mod-file">Mechanical — no design decisions</text>

  <!-- DEPLOY -->
  <text x="32" y="456" class="section">DEPLOYMENT</text>

  <rect x="32" y="468" width="250" height="72" rx="8" fill="#ffffff" stroke="#c4b5fd" filter="url(#s)"/>
  <rect x="32" y="468" width="250" height="24" rx="8" fill="#ede9fe"/>
  <rect x="32" y="486" width="250" height="6" fill="#ede9fe"/>
  <text x="100" y="486" class="mod-name" fill="#5b21b6">deploy/deploy.ts</text>
  <text x="44" y="506" class="mod-file">101 lines · Vercel REST API v13</text>
  <text x="44" y="520" class="mod-desc">deployToVercel(buildDir, slug) -> DeployResult</text>
  <text x="44" y="534" class="mod-file">Base64 upload · poll readyState · 60s timeout</text>

  <!-- Utils row -->
  <rect x="310" y="468" width="250" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="490" class="mod-name" fill="#475569">utils/env.ts</text>
  <text x="322" y="510" class="mod-file">requireEnv(key) — shared by all modules</text>
  <text x="322" y="524" class="mod-desc" style="fill:#15803d; font-weight:600;">+ toInternationalPhone() (NEW)</text>
  <text x="322" y="536" class="mod-file">Auto-format phone to E.164 format</text>

  <!-- Arrow: finalize -> deploy -->
  <path d="M 500 416 L 200 466" stroke="#f87171" stroke-width="1.2" marker-end="url(#ah-red)" stroke-dasharray="4 2"/>
  <text x="310" y="440" class="dep-label" style="fill:#f87171;">deploy</text>

  <!-- Shared utility lines -->
  <line x1="132" y1="288" x2="380" y2="468" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="350" y1="288" x2="420" y2="468" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- Legend -->
  <rect x="600" y="460" width="280" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="616" y="482" class="section">LEGEND</text>
  <line x1="616" y1="496" x2="656" y2="496" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="664" y="500" class="mod-file">Direct import</text>
  <line x1="616" y1="514" x2="656" y2="514" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ah)"/>
  <text x="664" y="518" class="mod-file">Import from prepare.ts</text>
  <line x1="616" y1="532" x2="656" y2="532" stroke="#f87171" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#ah-red)"/>
  <text x="664" y="536" class="mod-file">Deploy path (final step)</text>
</svg>