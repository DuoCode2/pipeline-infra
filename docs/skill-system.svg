<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <style>
      text { font-family: 'Inter', -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .label { font-size: 11px; font-weight: 600; }
      .sub { font-size: 9px; fill: #64748b; }
      .mono { font-size: 8.5px; font-family: 'SF Mono', monospace; fill: #94a3b8; }
      .layer { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    </style>
    <filter id="ds" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="10" fill="#fafbfc"/>
  <text x="32" y="36" class="title">Skill Architecture — 12 Skills (Flat Structure)</text>
  <text x="32" y="52" class="sub" style="font-size:10px;">.claude/skills/{name}/SKILL.md — pipeline commands + auto-load references + utility</text>

  <!-- ═══ PIPELINE SKILLS ═══ -->
  <rect x="20" y="72" width="430" height="436" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="36" y="96" class="layer" fill="#0369a1">PIPELINE SKILLS (slash commands)</text>
  <text x="36" y="112" class="sub">disable-model-invocation: true — user invokes explicitly</text>

  <!-- Discover -->
  <rect x="36" y="126" width="190" height="48" rx="6" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="48" y="146" class="label" fill="#0369a1">/discover</text>
  <text x="48" y="160" class="mono">discover/SKILL.md + scripts/</text>
  <text x="48" y="170" class="sub">Google Maps lead discovery</text>

  <!-- Generate -->
  <rect x="240" y="126" width="196" height="48" rx="6" fill="#ffffff" stroke="#d1fae5" filter="url(#ds)"/>
  <text x="252" y="146" class="label" fill="#059669">/generate</text>
  <text x="252" y="160" class="mono">generate/SKILL.md</text>
  <text x="252" y="170" class="sub">E2E site generation (10 steps)</text>

  <!-- Prepare Assets -->
  <rect x="36" y="186" width="190" height="48" rx="6" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="48" y="206" class="label" fill="#a16207">/prepare-assets</text>
  <text x="48" y="220" class="mono">prepare-assets/SKILL.md</text>
  <text x="48" y="230" class="sub">Photos + colors + optimize</text>

  <!-- Batch -->
  <rect x="240" y="186" width="196" height="48" rx="6" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="252" y="206" class="label" fill="#7e22ce">/batch</text>
  <text x="252" y="220" class="mono">batch/SKILL.md</text>
  <text x="252" y="230" class="sub">Multi-lead orchestration</text>

  <!-- Quality Gate -->
  <rect x="36" y="246" width="190" height="48" rx="6" fill="#ffffff" stroke="#d1fae5" filter="url(#ds)"/>
  <text x="48" y="266" class="label" fill="#059669">/quality-gate</text>
  <text x="48" y="280" class="mono">quality-gate/SKILL.md</text>
  <text x="48" y="290" class="sub">3-gate QA pipeline</text>

  <!-- Iterate Quality -->
  <rect x="240" y="246" width="196" height="48" rx="6" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="252" y="266" class="label" fill="#475569">/iterate-quality</text>
  <text x="252" y="280" class="mono">iterate-quality/SKILL.md</text>
  <text x="252" y="290" class="sub">Observe-modify-evaluate loop</text>

  <!-- Deploy -->
  <rect x="36" y="306" width="190" height="48" rx="6" fill="#ffffff" stroke="#c4b5fd" filter="url(#ds)"/>
  <text x="48" y="326" class="label" fill="#5b21b6">/deploy</text>
  <text x="48" y="340" class="mono">deploy/SKILL.md + resources/</text>
  <text x="48" y="350" class="sub">Vercel deployment</text>

  <!-- Skill Creator -->
  <rect x="240" y="306" width="196" height="48" rx="6" fill="#ffffff" stroke="#fde68a" filter="url(#ds)"/>
  <text x="252" y="326" class="label" fill="#a16207">/skill-creator</text>
  <text x="252" y="340" class="mono">skill-creator/SKILL.md</text>
  <text x="252" y="350" class="sub">Create + test + optimize skills</text>

  <!-- Hub skills within pipeline area -->
  <rect x="36" y="368" width="400" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="50" y="388" class="label" fill="#475569">Auto-load Hubs (user-invocable: false)</text>
  <text x="50" y="404" class="sub">toolchain/ — browser-use, lighthouse, n8n, github, sheets, svg, tailwind, favicon</text>
  <text x="50" y="416" class="sub">quality-standards/ — a11y, seo, perf, CWV, visual testing, schema markup, best practices</text>

  <!-- Project Standards -->
  <rect x="36" y="436" width="400" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="50" y="456" class="label" fill="#475569">project-standards/SKILL.md</text>
  <text x="50" y="468" class="sub">TypeScript conventions + data schema standards (auto-loaded)</text>

  <!-- ═══ DESIGN SYSTEM ═══ -->
  <rect x="464" y="72" width="420" height="436" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="480" y="96" class="layer" fill="#a16207">DESIGN SYSTEM (auto-load)</text>
  <text x="480" y="112" class="sub">duocode-design/ — user-invocable: false, loaded when generating sites</text>

  <!-- Core design skill -->
  <rect x="480" y="126" width="390" height="76" rx="8" fill="#ffffff" stroke="#fde68a" filter="url(#ds)"/>
  <text x="492" y="148" class="label" fill="#a16207">duocode-design/SKILL.md (Core)</text>
  <text x="492" y="164" class="sub">Shared design principles, anti-AI aesthetics, color, typography, SVG rules</text>
  <text x="492" y="178" class="mono">references/_foundations.md + _copy-foundations.md</text>
  <text x="492" y="190" class="mono">references/brand-identity.md + landing-page-patterns.md + copy-frameworks.md</text>

  <!-- Industry references -->
  <rect x="480" y="214" width="390" height="150" rx="8" fill="#ffffff" stroke="#fed7aa" filter="url(#ds)"/>
  <text x="492" y="236" class="label" fill="#c2410c">Industry Design References (on demand)</text>

  <rect x="494" y="248" width="110" height="44" rx="4" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="506" y="264" class="sub" style="font-weight:600;">Restaurant</text>
  <text x="506" y="278" class="mono">Playfair . organic</text>
  <text x="506" y="288" class="mono">warm . full-bleed</text>

  <rect x="614" y="248" width="110" height="44" rx="4" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="626" y="264" class="sub" style="font-weight:600;">Beauty</text>
  <text x="626" y="278" class="mono">Cormorant . elegant</text>
  <text x="626" y="288" class="mono">soft . split</text>

  <rect x="734" y="248" width="122" height="44" rx="4" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="746" y="264" class="sub" style="font-weight:600;">Clinic</text>
  <text x="746" y="278" class="mono">Inter . geometric</text>
  <text x="746" y="288" class="mono">cool . split</text>

  <rect x="494" y="300" width="110" height="44" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="506" y="316" class="sub" style="font-weight:600;">Fitness</text>
  <text x="506" y="330" class="mono">Oswald . geometric</text>
  <text x="506" y="340" class="mono">bold . full-bleed</text>

  <rect x="614" y="300" width="110" height="44" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="626" y="316" class="sub" style="font-weight:600;">Retail</text>
  <text x="626" y="330" class="mono">Poppins . modern</text>
  <text x="626" y="340" class="mono">vibrant . full-bleed</text>

  <rect x="734" y="300" width="122" height="44" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="746" y="316" class="sub" style="font-weight:600;">Service</text>
  <text x="746" y="330" class="mono">Lato . modern</text>
  <text x="746" y="340" class="mono">neutral . overlay</text>

  <!-- Schemas -->
  <rect x="480" y="376" width="390" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="492" y="398" class="label" fill="#475569">JSON Schemas</text>
  <text x="492" y="414" class="sub">Data field definitions per industry — what business.ts must contain</text>
  <text x="492" y="428" class="mono">schemas/_base.schema.json + {industry}.schema.json</text>

  <!-- Templates -->
  <rect x="480" y="448" width="390" height="48" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#ds)"/>
  <text x="492" y="468" class="label" fill="#475569">Next.js Templates</text>
  <text x="492" y="482" class="mono">templates/_shared/ + templates/{restaurant,beauty,retail}/</text>

  <!-- Load order -->
  <text x="480" y="508" class="sub" style="font-weight:600; fill:#a16207;">Load: SKILL.md > _foundations.md > {industry}.md > schema > templates</text>
</svg>
