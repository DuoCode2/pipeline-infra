<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 11px; font-weight: 500; fill: #64748b; letter-spacing: 1.5px; }
      .box-label { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .box-sub { font-size: 10px; font-weight: 400; fill: #64748b; }
      .tech { font-size: 9px; font-weight: 500; fill: #94a3b8; font-family: 'SF Mono', 'Fira Code', monospace; }
      .phase-label { font-size: 11px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
      .phase-num { font-size: 18px; font-weight: 700; fill: rgba(255,255,255,0.3); }
      .arrow { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .arrow-head { fill: #cbd5e1; }
      .connector { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="grad-brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad-p1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad-p2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="grad-p3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad-p4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="grad-p5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow-head"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="1100" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="24" width="1100" height="32" fill="#0f172a"/>

  <!-- Header -->
  <text x="32" y="36" class="title" fill="#ffffff">DuoCode Pipeline — System Architecture</text>
  <text x="820" y="36" class="subtitle" fill="#94a3b8">AUTOMATED SITE GENERATION</text>

  <!-- ═══ CENTRAL BRAIN ═══ -->
  <rect x="420" y="78" width="260" height="72" rx="16" fill="url(#grad-brain)" filter="url(#glow)"/>
  <text x="455" y="107" class="phase-label" style="font-size:14px;">Claude Code</text>
  <text x="455" y="123" style="font-size:10px; fill: rgba(255,255,255,0.7);">Central Orchestrator — drives every phase</text>
  <text x="455" y="139" class="tech" style="fill: rgba(255,255,255,0.5);">packages/batch/orchestrate.ts</text>
  <!-- Brain icon -->
  <circle cx="640" cy="110" r="16" fill="rgba(255,255,255,0.15)"/>
  <text x="633" y="116" style="font-size:16px; fill:#fff;">🧠</text>

  <!-- ═══ PHASE 1: DISCOVERY ═══ -->
  <rect x="32" y="190" width="220" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="32" y="190" width="220" height="32" rx="10" fill="url(#grad-p1)"/>
  <rect x="32" y="210" width="220" height="12" fill="url(#grad-p1)"/>
  <text x="78" y="211" class="phase-label">PHASE 1 · DISCOVERY</text>
  <text x="44" y="244" class="box-label">Google Maps Places API</text>
  <text x="44" y="260" class="box-sub">Search businesses without websites</text>
  <text x="44" y="278" class="tech">packages/discover/search.ts</text>
  <text x="44" y="292" class="tech">PlaceResult[] → id, name, photos, hours</text>
  <text x="44" y="306" class="box-sub">Pagination: max 3 pages × 20 results</text>

  <!-- ═══ PHASE 2: CLASSIFY ═══ -->
  <rect x="280" y="190" width="220" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="280" y="190" width="220" height="32" rx="10" fill="url(#grad-p2)"/>
  <rect x="280" y="210" width="220" height="12" fill="url(#grad-p2)"/>
  <text x="318" y="211" class="phase-label">PHASE 2 · CLASSIFY</text>
  <text x="292" y="244" class="box-label">Industry Classification</text>
  <text x="292" y="260" class="box-sub">Maps primaryType → 7 industries</text>
  <text x="292" y="278" class="tech">packages/generate/industry-config.ts</text>
  <text x="292" y="292" class="tech">classifyIndustry() + INDUSTRY_CONFIG</text>
  <text x="292" y="306" class="box-sub">50+ Google type mappings</text>

  <!-- ═══ PHASE 3: GENERATE ═══ -->
  <rect x="528" y="190" width="270" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="528" y="190" width="270" height="32" rx="10" fill="url(#grad-p3)"/>
  <rect x="528" y="210" width="270" height="12" fill="url(#grad-p3)"/>
  <text x="580" y="211" class="phase-label">PHASE 3 · GENERATE</text>
  <text x="540" y="244" class="box-label">Site Generation Engine</text>
  <text x="540" y="260" class="box-sub">Assets → Templates → Build → Quality Gates</text>
  <text x="540" y="278" class="tech">Next.js 14 + Tailwind 3 + TypeScript 5</text>
  <text x="540" y="292" class="tech">4 locales: en, ms, zh-CN, zh-TW</text>
  <text x="540" y="306" class="box-sub">7 industry templates + design system</text>

  <!-- ═══ PHASE 4: DEPLOY ═══ -->
  <rect x="826" y="190" width="242" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="826" y="190" width="242" height="32" rx="10" fill="url(#grad-p4)"/>
  <rect x="826" y="210" width="242" height="12" fill="url(#grad-p4)"/>
  <text x="880" y="211" class="phase-label">PHASE 4 · DEPLOY</text>
  <text x="838" y="244" class="box-label">Push &amp; Deploy</text>
  <text x="838" y="260" class="box-sub">GitHub (DuoCode2 org) + Vercel</text>
  <text x="838" y="278" class="tech">packages/deploy/deploy.ts</text>
  <text x="838" y="292" class="tech">Vercel REST API v13 → production</text>
  <text x="838" y="306" class="box-sub">Auto-link Vercel ↔ GitHub repo</text>

  <!-- Arrows between phases -->
  <line x1="252" y1="255" x2="278" y2="255" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="255" x2="526" y2="255" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="798" y1="255" x2="824" y2="255" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Arrows from brain to phases -->
  <path d="M 460 150 L 142 188" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="4 3"/>
  <path d="M 510 150 L 390 188" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="4 3"/>
  <path d="M 570 150 L 663 188" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="4 3"/>
  <path d="M 630 150 L 947 188" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="4 3"/>

  <!-- ═══ GENERATION DETAIL (Phase 3 breakdown) ═══ -->
  <rect x="32" y="356" width="1036" height="200" rx="10" fill="#ffffff" stroke="#d1fae5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="32" y="356" width="1036" height="30" rx="10" fill="#ecfdf5"/>
  <rect x="32" y="376" width="1036" height="10" fill="#ecfdf5"/>
  <text x="48" y="377" style="font-size: 11px; font-weight: 700; fill: #059669; letter-spacing: 1px;">PHASE 3 DETAIL — PER-LEAD GENERATION PIPELINE</text>

  <!-- Step boxes -->
  <!-- 1. Photos -->
  <rect x="48" y="400" width="130" height="64" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="62" y="420" style="font-size: 10px; font-weight: 600; fill: #0369a1;">📷 Download Photos</text>
  <text x="62" y="436" class="tech" style="fill:#64748b;">maps-photos.ts</text>
  <text x="62" y="449" class="tech" style="fill:#64748b;">stock-photos.ts</text>

  <!-- 2. Colors -->
  <rect x="196" y="400" width="130" height="64" rx="6" fill="#fefce8" stroke="#fde68a"/>
  <text x="210" y="420" style="font-size: 10px; font-weight: 600; fill: #a16207;">🎨 Extract Colors</text>
  <text x="210" y="436" class="tech" style="fill:#64748b;">extract-colors.ts</text>
  <text x="210" y="449" class="tech" style="fill:#64748b;">node-vibrant → 6 vars</text>

  <!-- 3. Optimize -->
  <rect x="344" y="400" width="130" height="64" rx="6" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="358" y="420" style="font-size: 10px; font-weight: 600; fill: #7e22ce;">⚡ Optimize Images</text>
  <text x="358" y="436" class="tech" style="fill:#64748b;">optimize-images.ts</text>
  <text x="358" y="449" class="tech" style="fill:#64748b;">Sharp → 4 WebP sizes</text>

  <!-- 4. Template -->
  <rect x="492" y="400" width="130" height="64" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="506" y="420" style="font-size: 10px; font-weight: 600; fill: #15803d;">📄 Copy Templates</text>
  <text x="506" y="436" class="tech" style="fill:#64748b;">_shared + {industry}</text>
  <text x="506" y="449" class="tech" style="fill:#64748b;">overlay components</text>

  <!-- 5. Generate -->
  <rect x="640" y="400" width="130" height="64" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="654" y="420" style="font-size: 10px; font-weight: 600; fill: #c2410c;">✏️ Generate Data</text>
  <text x="654" y="436" class="tech" style="fill:#64748b;">business.ts (4 lang)</text>
  <text x="654" y="449" class="tech" style="fill:#64748b;">SVG decorations</text>

  <!-- 6. Build -->
  <rect x="788" y="400" width="130" height="64" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="802" y="420" style="font-size: 10px; font-weight: 600; fill: #0369a1;">🔨 Build &amp; Gate</text>
  <text x="802" y="436" class="tech" style="fill:#64748b;">next build (static)</text>
  <text x="802" y="449" class="tech" style="fill:#64748b;">Lighthouse audit</text>

  <!-- 7. Deploy -->
  <rect x="936" y="400" width="118" height="64" rx="6" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="950" y="420" style="font-size: 10px; font-weight: 600; fill: #7e22ce;">🚀 Deploy</text>
  <text x="950" y="436" class="tech" style="fill:#64748b;">Vercel API v13</text>
  <text x="950" y="449" class="tech" style="fill:#64748b;">gh repo create</text>

  <!-- Step arrows -->
  <line x1="178" y1="432" x2="194" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="326" y1="432" x2="342" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="474" y1="432" x2="490" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="622" y1="432" x2="638" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="432" x2="786" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="918" y1="432" x2="934" y2="432" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Quality gates row -->
  <text x="48" y="492" style="font-size: 10px; font-weight: 600; fill: #059669;">QUALITY GATES:</text>
  <rect x="160" y="479" width="180" height="22" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="172" y="494" style="font-size: 9px; font-weight: 600; fill: #166534;">Gate 1: npm run build = 0 errors</text>
  <rect x="354" y="479" width="260" height="22" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="366" y="494" style="font-size: 9px; font-weight: 600; fill: #166534;">Gate 2: Lighthouse perf≥90 a11y=100 seo≥95</text>
  <rect x="628" y="479" width="230" height="22" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="640" y="494" style="font-size: 9px; font-weight: 600; fill: #166534;">Gate 3: Visual QA screenshot ≥ 75/100</text>

  <!-- Output indicator -->
  <rect x="880" y="479" width="170" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="892" y="494" style="font-size: 9px; font-weight: 600; fill: #1e40af;">→ output/{slug}/out/</text>

  <!-- ═══ EXTERNAL SERVICES ═══ -->
  <text x="48" y="596" class="subtitle">EXTERNAL SERVICES &amp; INFRASTRUCTURE</text>

  <!-- n8n -->
  <rect x="32" y="610" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="32" y="610" width="180" height="26" rx="8" fill="#fef3c7"/>
  <rect x="32" y="628" width="180" height="8" fill="#fef3c7"/>
  <text x="76" y="630" style="font-size: 11px; font-weight: 600; fill: #92400e;">n8n Workflows</text>
  <text x="44" y="654" class="tech" style="fill:#64748b;">Docker · port 5678</text>
  <text x="44" y="668" class="box-sub">prepare-assets webhook</text>
  <text x="44" y="682" class="box-sub">log-work · lead-status</text>
  <text x="44" y="696" class="tech" style="fill:#94a3b8;">n8n/docker-compose.yml</text>

  <!-- Google APIs -->
  <rect x="230" y="610" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="230" y="610" width="180" height="26" rx="8" fill="#dbeafe"/>
  <rect x="230" y="628" width="180" height="8" fill="#dbeafe"/>
  <text x="268" y="630" style="font-size: 11px; font-weight: 600; fill: #1e40af;">Google Cloud</text>
  <text x="242" y="654" class="box-sub">Places API (New)</text>
  <text x="242" y="668" class="box-sub">Places Photo Media API</text>
  <text x="242" y="682" class="box-sub">Gemini 2.5 Flash (via n8n)</text>
  <text x="242" y="696" class="box-sub">Google Sheets (leads)</text>

  <!-- Photo APIs -->
  <rect x="428" y="610" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="428" y="610" width="180" height="26" rx="8" fill="#fce7f3"/>
  <rect x="428" y="628" width="180" height="8" fill="#fce7f3"/>
  <text x="470" y="630" style="font-size: 11px; font-weight: 600; fill: #9d174d;">Stock Photos</text>
  <text x="440" y="654" class="box-sub">Unsplash API</text>
  <text x="440" y="668" class="box-sub">Unsplash API (fallback)</text>
  <text x="440" y="682" class="tech" style="fill:#64748b;">Automatic attribution</text>
  <text x="440" y="696" class="tech" style="fill:#94a3b8;">packages/assets/stock-photos.ts</text>

  <!-- Vercel -->
  <rect x="626" y="610" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="626" y="610" width="180" height="26" rx="8" fill="#ede9fe"/>
  <rect x="626" y="628" width="180" height="8" fill="#ede9fe"/>
  <text x="680" y="630" style="font-size: 11px; font-weight: 600; fill: #5b21b6;">Vercel</text>
  <text x="638" y="654" class="box-sub">REST API v13 deployments</text>
  <text x="638" y="668" class="box-sub">Static hosting (CDN)</text>
  <text x="638" y="682" class="box-sub">Clean URLs + redirects</text>
  <text x="638" y="696" class="tech" style="fill:#94a3b8;">{slug}.vercel.app</text>

  <!-- GitHub -->
  <rect x="824" y="610" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="824" y="610" width="180" height="26" rx="8" fill="#f1f5f9"/>
  <rect x="824" y="628" width="180" height="8" fill="#f1f5f9"/>
  <text x="874" y="630" style="font-size: 11px; font-weight: 600; fill: #1e293b;">GitHub</text>
  <text x="836" y="654" class="box-sub">DuoCode2 organization</text>
  <text x="836" y="668" class="box-sub">Private repos per site</text>
  <text x="836" y="682" class="box-sub">gh CLI automation</text>
  <text x="836" y="696" class="tech" style="fill:#94a3b8;">github.com/DuoCode2/{slug}</text>

  <!-- ═══ FUTURE ═══ -->
  <rect x="32" y="724" width="170" height="40" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-dasharray="4 3"/>
  <text x="60" y="749" style="font-size: 10px; font-weight: 500; fill: #e11d48;">Phase 5 · WhatsApp Outreach</text>
  <text x="208" y="749" class="tech" style="fill:#94a3b8;">Evolution API (Docker) — planned</text>

  <!-- Version info -->
  <text x="880" y="764" style="font-size: 9px; fill: #94a3b8;">v1.0.0 · Next.js 14 · TypeScript 5 · Node.js</text>
</svg>
