<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 11px; font-weight: 500; fill: #64748b; letter-spacing: 1.5px; }
      .box-label { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .box-sub { font-size: 10px; font-weight: 400; fill: #64748b; }
      .tech { font-size: 9px; font-weight: 500; fill: #94a3b8; font-family: 'SF Mono', 'Fira Code', monospace; }
      .phase-label { font-size: 11px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
      .phase-num { font-size: 18px; font-weight: 700; fill: rgba(255,255,255,0.3); }
      .arrow { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .arrow-head { fill: #cbd5e1; }
      .connector { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="grad-brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad-p1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad-p2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="grad-p3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad-p4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="grad-p5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow-head"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="1100" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="24" width="1100" height="32" fill="#0f172a"/>

  <!-- Header -->
  <text x="32" y="36" class="title" fill="#ffffff">DuoCode Pipeline — System Architecture</text>
  <text x="820" y="36" class="subtitle" fill="#94a3b8">AUTOMATED SITE GENERATION</text>

  <!-- 3 PHASES -->

  <!-- PHASE 1: PREPARE (Mechanical) -->
  <rect x="32" y="84" width="300" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="32" y="84" width="300" height="32" rx="10" fill="url(#grad-p1)"/>
  <rect x="32" y="104" width="300" height="12" fill="url(#grad-p1)"/>
  <text x="80" y="105" class="phase-label">PHASE 1 · PREPARE (mechanical)</text>
  <text x="44" y="138" class="box-label">Discovery + Asset Preparation</text>
  <text x="44" y="154" class="box-sub">Google Maps search + photo download</text>
  <text x="44" y="170" class="box-sub">Color extraction + image optimization</text>
  <text x="44" y="186" class="box-sub">Scaffold copy + classification hints</text>
  <text x="44" y="202" class="tech">search.ts + pipeline/prepare.ts</text>
  <text x="44" y="216" class="tech">Outputs: lead (raw data) + hints (suggestions)</text>

  <!-- PHASE 2: CLAUDE DESIGN (Creative) — center, highlighted -->
  <rect x="380" y="76" width="340" height="156" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="2" filter="url(#glow)"/>
  <rect x="380" y="76" width="340" height="34" rx="12" fill="url(#grad-brain)"/>
  <rect x="380" y="100" width="340" height="10" fill="url(#grad-brain)"/>
  <text x="420" y="100" class="phase-label" style="font-size:12px;">PHASE 2 · CLAUDE DESIGN (creative decision-maker)</text>
  <!-- Brain icon -->
  <circle cx="688" cy="93" r="14" fill="rgba(255,255,255,0.15)"/>
  <text x="682" y="99" style="font-size:14px; fill:#fff;">&#x1F9E0;</text>

  <text x="392" y="132" class="box-label">Claude Makes All Design Decisions</text>
  <text x="392" y="148" class="box-sub">Reads lead data + hints + reference docs</text>
  <text x="392" y="164" class="box-sub">Picks fonts, site structure, platform integrations</text>
  <text x="392" y="180" class="box-sub">Downloads fonts, writes components from shared UI</text>
  <text x="392" y="196" class="box-sub">Dev preview for visual verification</text>
  <text x="392" y="212" class="tech">frontend-design + duocode-design skills</text>
  <text x="392" y="226" class="tech">Inputs: hints + platforms-by-region.md + generic-market.md</text>

  <!-- PHASE 3: FINALIZE (Mechanical) -->
  <rect x="770" y="84" width="298" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="770" y="84" width="298" height="32" rx="10" fill="url(#grad-p3)"/>
  <rect x="770" y="104" width="298" height="12" fill="url(#grad-p3)"/>
  <text x="818" y="105" class="phase-label">PHASE 3 · FINALIZE (mechanical)</text>
  <text x="782" y="138" class="box-label">Build + Quality + Deploy</text>
  <text x="782" y="154" class="box-sub">Next.js static build (0 errors)</text>
  <text x="782" y="170" class="box-sub">Lighthouse audit (a11y/SEO/perf)</text>
  <text x="782" y="186" class="box-sub">Vercel deploy + GitHub push</text>
  <text x="782" y="202" class="tech">pipeline/finalize.ts + deploy/deploy.ts</text>
  <text x="782" y="216" class="tech">Vercel API v13 + gh CLI</text>

  <!-- Arrows between phases -->
  <line x1="332" y1="154" x2="378" y2="154" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="154" x2="768" y2="154" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Data labels on arrows -->
  <text x="336" y="148" class="tech" style="fill:#0ea5e9; font-weight:600;">lead + hints</text>
  <text x="726" y="148" class="tech" style="fill:#059669; font-weight:600;">built site</text>

  <!-- Hints + Reference Docs flowing to Claude -->
  <rect x="356" y="246" width="188" height="54" rx="6" fill="#fefce8" stroke="#fde68a"/>
  <text x="368" y="264" style="font-size: 10px; font-weight: 600; fill: #a16207;">Hints + Reference Docs</text>
  <text x="368" y="278" class="tech" style="fill:#a16207;">ClassificationHint (not binding)</text>
  <text x="368" y="290" class="tech" style="fill:#a16207;">platforms-by-region.md</text>

  <rect x="560" y="246" width="166" height="54" rx="6" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="572" y="264" style="font-size: 10px; font-weight: 600; fill: #7e22ce;">Shared UI Components</text>
  <text x="572" y="278" class="tech" style="fill:#7e22ce;">10 pre-built components</text>
  <text x="572" y="290" class="tech" style="fill:#7e22ce;">@/components/ui/*</text>

  <!-- Dashed arrows from support boxes to Design phase -->
  <path d="M 450 246 L 500 232" class="connector"/>
  <path d="M 640 246 L 600 232" class="connector"/>

  <!-- PREPARE DETAIL -->
  <rect x="32" y="330" width="1036" height="130" rx="10" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="32" y="330" width="1036" height="28" rx="10" fill="#f0f9ff"/>
  <rect x="32" y="350" width="1036" height="8" fill="#f0f9ff"/>
  <text x="48" y="350" style="font-size: 11px; font-weight: 700; fill: #0369a1; letter-spacing: 1px;">PREPARE DETAIL — MECHANICAL DATA GATHERING (no design decisions)</text>

  <rect x="48" y="372" width="130" height="56" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="62" y="390" style="font-size: 10px; font-weight: 600; fill: #0369a1;">&#x1F50D; Discover</text>
  <text x="62" y="404" class="tech" style="fill:#64748b;">search.ts (130 lines)</text>
  <text x="62" y="417" class="tech" style="fill:#64748b;">Google Maps Places</text>

  <line x1="178" y1="400" x2="198" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="200" y="372" width="130" height="56" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="214" y="390" style="font-size: 10px; font-weight: 600; fill: #0369a1;">&#x1F4F7; Photos</text>
  <text x="214" y="404" class="tech" style="fill:#64748b;">maps-photos.ts</text>
  <text x="214" y="417" class="tech" style="fill:#64748b;">stock-photos.ts</text>

  <line x1="330" y1="400" x2="350" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="352" y="372" width="130" height="56" rx="6" fill="#fefce8" stroke="#fde68a"/>
  <text x="366" y="390" style="font-size: 10px; font-weight: 600; fill: #a16207;">&#x1F3A8; Colors</text>
  <text x="366" y="404" class="tech" style="fill:#64748b;">extract-colors.ts</text>
  <text x="366" y="417" class="tech" style="fill:#64748b;">node-vibrant</text>

  <line x1="482" y1="400" x2="502" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="504" y="372" width="130" height="56" rx="6" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="518" y="390" style="font-size: 10px; font-weight: 600; fill: #7e22ce;">&#x26A1; Optimize</text>
  <text x="518" y="404" class="tech" style="fill:#64748b;">optimize-images.ts</text>
  <text x="518" y="417" class="tech" style="fill:#64748b;">Sharp WebP</text>

  <line x1="634" y1="400" x2="654" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="656" y="372" width="130" height="56" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="670" y="390" style="font-size: 10px; font-weight: 600; fill: #15803d;">&#x1F4C4; Scaffold</text>
  <text x="670" y="404" class="tech" style="fill:#64748b;">_shared templates</text>
  <text x="670" y="417" class="tech" style="fill:#64748b;">10 UI components</text>

  <line x1="786" y1="400" x2="806" y2="400" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="808" y="372" width="140" height="56" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="822" y="390" style="font-size: 10px; font-weight: 600; fill: #c2410c;">&#x1F4A1; Classify Hints</text>
  <text x="822" y="404" class="tech" style="fill:#64748b;">ClassificationHint</text>
  <text x="822" y="417" class="tech" style="fill:#64748b;">suggestions, not binding</text>

  <!-- Output label -->
  <rect x="48" y="436" width="180" height="18" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="58" y="449" style="font-size: 9px; font-weight: 600; fill: #1e40af;">Output: PrepareResult (lead + hints)</text>

  <!-- EXTERNAL SERVICES -->
  <text x="48" y="498" class="subtitle">EXTERNAL SERVICES &amp; INFRASTRUCTURE</text>

  <!-- n8n -->
  <rect x="32" y="510" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="32" y="510" width="180" height="26" rx="8" fill="#fef3c7"/>
  <rect x="32" y="528" width="180" height="8" fill="#fef3c7"/>
  <text x="76" y="530" style="font-size: 11px; font-weight: 600; fill: #92400e;">n8n Workflows</text>
  <text x="44" y="554" class="tech" style="fill:#64748b;">Docker port 5678</text>
  <text x="44" y="568" class="box-sub">prepare-assets webhook</text>
  <text x="44" y="582" class="box-sub">log-work / lead-status</text>
  <text x="44" y="596" class="tech" style="fill:#94a3b8;">n8n/docker-compose.yml</text>

  <!-- Google APIs -->
  <rect x="230" y="510" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="230" y="510" width="180" height="26" rx="8" fill="#dbeafe"/>
  <rect x="230" y="528" width="180" height="8" fill="#dbeafe"/>
  <text x="268" y="530" style="font-size: 11px; font-weight: 600; fill: #1e40af;">Google Cloud</text>
  <text x="242" y="554" class="box-sub">Places API (New)</text>
  <text x="242" y="568" class="box-sub">Places Photo Media API</text>
  <text x="242" y="582" class="box-sub">Gemini 2.5 Flash (via n8n)</text>
  <text x="242" y="596" class="box-sub">Google Sheets (leads)</text>

  <!-- Photo APIs -->
  <rect x="428" y="510" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="428" y="510" width="180" height="26" rx="8" fill="#fce7f3"/>
  <rect x="428" y="528" width="180" height="8" fill="#fce7f3"/>
  <text x="470" y="530" style="font-size: 11px; font-weight: 600; fill: #9d174d;">Stock Photos</text>
  <text x="440" y="554" class="box-sub">Unsplash API</text>
  <text x="440" y="568" class="box-sub">Unsplash API (fallback)</text>
  <text x="440" y="582" class="tech" style="fill:#64748b;">Automatic attribution</text>
  <text x="440" y="596" class="tech" style="fill:#94a3b8;">packages/assets/stock-photos.ts</text>

  <!-- Vercel -->
  <rect x="626" y="510" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="626" y="510" width="180" height="26" rx="8" fill="#ede9fe"/>
  <rect x="626" y="528" width="180" height="8" fill="#ede9fe"/>
  <text x="680" y="530" style="font-size: 11px; font-weight: 600; fill: #5b21b6;">Vercel</text>
  <text x="638" y="554" class="box-sub">REST API v13 deployments</text>
  <text x="638" y="568" class="box-sub">Static hosting (CDN)</text>
  <text x="638" y="582" class="box-sub">Clean URLs + redirects</text>
  <text x="638" y="596" class="tech" style="fill:#94a3b8;">{slug}.vercel.app</text>

  <!-- GitHub -->
  <rect x="824" y="510" width="180" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="824" y="510" width="180" height="26" rx="8" fill="#f1f5f9"/>
  <rect x="824" y="528" width="180" height="8" fill="#f1f5f9"/>
  <text x="874" y="530" style="font-size: 11px; font-weight: 600; fill: #1e293b;">GitHub</text>
  <text x="836" y="554" class="box-sub">DuoCode2 organization</text>
  <text x="836" y="568" class="box-sub">Private repos per site</text>
  <text x="836" y="582" class="box-sub">gh CLI automation</text>
  <text x="836" y="596" class="tech" style="fill:#94a3b8;">github.com/DuoCode2/{slug}</text>

  <!-- FUTURE -->
  <rect x="32" y="624" width="170" height="40" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-dasharray="4 3"/>
  <text x="60" y="649" style="font-size: 10px; font-weight: 500; fill: #e11d48;">Phase 5 · WhatsApp Outreach</text>
  <text x="208" y="649" class="tech" style="fill:#94a3b8;">Evolution API (Docker) — planned</text>

  <!-- Version info -->
  <text x="880" y="764" style="font-size: 9px; fill: #94a3b8;">v2.0.0 · Next.js 14 · TypeScript 5 · Node.js</text>
</svg>