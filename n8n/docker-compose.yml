  #   environment:
  #     - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
  #     # 使用 SQLite (无需 PostgreSQL)
  #     - DATABASE_PROVIDER=sqlite
  #     - DATABASE_CONNECTION_URI=file:///evolution/data/evolution.db
