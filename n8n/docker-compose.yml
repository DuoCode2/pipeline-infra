# DuoCode Pipeline — Docker Compose
# 启动: docker compose up -d
# 健康检查: curl http://localhost:5678/healthz
# 更新 n8n: 改 Dockerfile ARG N8N_VERSION → docker compose up -d --build

services:
  # ── n8n 工作流引擎 ──────────────────────────────────
  n8n:
    container_name: duocode-n8n
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["5678:5678"]
    restart: unless-stopped
    stop_grace_period: 30s
    entrypoint: ["tini", "--"]
    command: ["/bin/sh", "/scripts/init-workflows.sh"]
    volumes:
      - n8n_data:/home/node/.n8n
      - ../output:/output
      - ./workflows:/workflows
      - ./init-workflows.sh:/scripts/init-workflows.sh:ro
    tmpfs:
      - /tmp:size=256m
    env_file:
      - ../.env
    environment:
      # Static config (not from .env)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_PUBLIC_API_DISABLED=false
      - N8N_RUNNERS_ENABLED=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - NODE_FUNCTION_ALLOW_EXTERNAL=node-vibrant,sharp,svgo,@vercel/sdk,@googlemaps/google-maps-services-js
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,crypto,child_process,url,https
      - EVOLUTION_API_URL=http://evolution-api:8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    networks:
      - duocode

  # ── Evolution API (Phase 5: WhatsApp 外联) ──────────
  # 取消注释以启用 WhatsApp 外联功能
  # evolution-api:
